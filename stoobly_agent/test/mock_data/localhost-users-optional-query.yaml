# Minimal OpenAPI spec for tests: GET http://localhost:80/users?a=1&b=1 (a, b optional)
openapi: "3.0.0"
info:
  title: Localhost users test API
  version: "1.0.0"
servers:
  - url: http://localhost:80
paths:
  /users:
    get:
      summary: List users
      operationId: listUsers
      parameters:
        - name: a
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: b
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
