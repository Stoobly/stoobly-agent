services:
  build.init:
    build:
      context: ./
      dockerfile: ../Dockerfile.proxy
    extends:
      file: ../docker-compose.base.yml
      service: build.init_base
    profiles:
      - record
  build.configure:
    build:
      context: ./
      dockerfile: ../Dockerfile.proxy
    depends_on:
      build.init:
        condition: service_completed_successfully
    extends:
      file: ../docker-compose.base.yml
      service: build.configure_base
    profiles:
      - record
