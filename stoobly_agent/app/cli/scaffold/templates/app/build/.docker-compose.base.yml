services:
  build.init_base:
    command: 
    - ${SERVICE_SCRIPTS}/${SERVICE_NAME}/${WORKFLOW_TEMPLATE}/.init
    - init
    - ${APP_DIR_MOUNT}
    extends:
      file: ../.docker-compose.base.yml
      service: context_base
    volumes:
    - ${APP_DIR}:/app:ro
    working_dir: /home/stoobly/.stoobly/services/${SERVICE_NAME}/${WORKFLOW_NAME}
