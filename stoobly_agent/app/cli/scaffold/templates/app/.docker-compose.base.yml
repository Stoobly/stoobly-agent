services:
  context_base:
    extends:
      service: stoobly_base
    volumes:
      - ${CONTEXT_DIR}/.stoobly/db:/home/stoobly/.stoobly/db
      - ${CONTEXT_DIR}/.stoobly/settings.yml:/home/stoobly/.stoobly/settings.yml
      - ${CONTEXT_DIR}/.stoobly/snapshots:/home/stoobly/.stoobly/snapshots
      - ${APP_DIR}/.stoobly/ca_certs:/home/stoobly/.stoobly/ca_certs
      - ${APP_DIR}/.stoobly/certs:/home/stoobly/.stoobly/certs
      - ${APP_DIR}/.stoobly/tmp:/home/stoobly/.stoobly/tmp
      - ${RUNTIME_APP_DIR:-${APP_DIR}}/.stoobly/services:/home/stoobly/.stoobly/services
  stoobly_base:
    image: stoobly.${USER_ID}