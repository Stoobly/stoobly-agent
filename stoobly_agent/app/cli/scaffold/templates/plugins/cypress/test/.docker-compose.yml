services:
  entrypoint.cypress:
    build:
      args:
        CYPRESS_IMAGE: ${CYPRESS_IMAGE:-cypress/browsers:22.11.0}
        GOLANG_IMAGE: ${GOLANG_IMAGE:-golang:1.25.8-alpine}
        GOSU_VERSION: ${GOSU_VERSION:-1.19}
        USER_ID: ${USER_ID}
      context: ./
      dockerfile: ./.Dockerfile.cypress
    command: ${CYPRESS_COMMAND:-npx cypress run --project .}
    depends_on:
      entrypoint.init:
        condition: service_completed_successfully
    networks:
      - "app.ingress"
    profiles:
      - ${WORKFLOW_NAME}
    user: stoobly
    volumes:
      - ${CONTEXT_DIR}:/home/stoobly